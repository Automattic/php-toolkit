name: Push MD E2E

on:
  pull_request:
  push:
    branches: [trunk]

jobs:
  e2e:
    name: Push MD E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      WP_VERSION: '6.9.4'
      WP_DIR: ${{ github.workspace }}/.ci/wordpress
      WP_URL: http://127.0.0.1:8080
      WP_ADMIN_USER: admin
      WP_ADMIN_PASS: password

    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: '8.1'
          extensions: zip, sqlite3, pdo, pdo_sqlite, mysqli, mbstring, curl
          coverage: none
          tools: phpunit-polyfills

      - name: Install Composer dependencies
        run: |
          rm composer.lock
          cp composer-ci-matrix-tests.json composer.json
          composer install --no-interaction --no-progress --optimize-autoloader

      - name: Install wp-cli
        run: |
          curl -sSLO https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
          chmod +x wp-cli.phar
          sudo mv wp-cli.phar /usr/local/bin/wp

      - name: Wait for MySQL
        run: |
          for _ in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -proot --silent; then exit 0; fi
            sleep 2
          done
          echo "MySQL never came up." >&2
          exit 1

      - name: Download and configure WordPress
        run: |
          mkdir -p "$WP_DIR"
          wp --path="$WP_DIR" core download --version="$WP_VERSION"
          wp --path="$WP_DIR" config create \
            --dbname=wordpress \
            --dbuser=root \
            --dbpass=root \
            --dbhost=127.0.0.1:3306 \
            --extra-php <<'PHP'
          define( 'WP_ENVIRONMENT_TYPE', 'local' );
          define( 'WP_DEBUG', true );
          PHP
          wp --path="$WP_DIR" core install \
            --url="$WP_URL" \
            --title="Push MD E2E" \
            --admin_user="$WP_ADMIN_USER" \
            --admin_email="admin@example.com" \
            --admin_password="$WP_ADMIN_PASS" \
            --skip-email
          wp --path="$WP_DIR" option update permalink_structure '/%postname%/'
          wp --path="$WP_DIR" rewrite flush --hard
          wp --path="$WP_DIR" option update gutenberg-experiments '{"gutenberg-guidelines":true}' --format=json

      - name: Seed Hello World post, Sample Page, and Template
        run: |
          wp --path="$WP_DIR" post update 1 \
            --post_title='Hello World' \
            --post_content='<!-- wp:paragraph --><p>Hello from WordPress</p><!-- /wp:paragraph -->' \
            --post_status=publish
          wp --path="$WP_DIR" post update 2 \
            --post_title='Sample Page' \
            --post_content='<!-- wp:paragraph --><p>Page from WordPress</p><!-- /wp:paragraph -->' \
            --post_status=publish
          wp --path="$WP_DIR" post create \
            --post_type=wp_template \
            --post_name='blog-home' \
            --post_title='Blog Home' \
            --post_content='<!-- wp:group --><div class="wp-block-group"><!-- wp:paragraph --><p>Template from WordPress</p><!-- /wp:paragraph --></div><!-- /wp:group -->' \
            --post_status=publish

      - name: Generate bulk posts to force multi-tick seeding
        run: |
          # 28 generated posts + the 2 seeded ones = 30 total. Combined
          # with the CI test helper's batch_size=5 / time_budget=0
          # filters this forces the seeder to reschedule itself across
          # at least 6 cron ticks before reaching `done`.
          wp --path="$WP_DIR" post generate \
            --count=28 \
            --post_type=post \
            --post_status=publish \
            --post_title='CI bulk post' \
            --post_content='<!-- wp:paragraph --><p>Bulk post for the multi-tick seeder e2e test.</p><!-- /wp:paragraph -->'

      - name: Install CI seeder helper as a mu-plugin
        run: |
          mkdir -p "$WP_DIR/wp-content/mu-plugins"
          cp "$GITHUB_WORKSPACE/plugins/push-md/Tests/ci-mu-test-helper.php" \
            "$WP_DIR/wp-content/mu-plugins/push-md-ci-test-helper.php"

      - name: Mount toolkit components and activate plugin
        run: |
          rm -rf "$WP_DIR/wp-content/plugins/push-md"
          ln -s "$GITHUB_WORKSPACE/plugins/push-md" "$WP_DIR/wp-content/plugins/push-md"
          ln -s "$GITHUB_WORKSPACE/components" "$WP_DIR/wp-content/components"
          ln -s "$GITHUB_WORKSPACE/vendor" "$WP_DIR/wp-content/vendor"
          wp --path="$WP_DIR" plugin activate push-md

      - name: Drive seeder cron until done
        run: |
          for i in $(seq 1 30); do
            wp --path="$WP_DIR" cron event run --due-now > /dev/null 2>&1 || true
            STATE=$(wp --path="$WP_DIR" option get pmd_seed_state 2>/dev/null || echo "pending")
            echo "tick $i: state=$STATE"
            if [ "$STATE" = "done" ]; then exit 0; fi
            if [ "$STATE" = "failed" ]; then
              wp --path="$WP_DIR" option get pmd_seed_progress
              exit 1
            fi
            sleep 1
          done
          echo "Seeder never reached 'done' state." >&2
          wp --path="$WP_DIR" option get pmd_seed_progress
          exit 1

      - name: Create Application Password
        id: app_password
        run: |
          PASSWORD=$(wp --path="$WP_DIR" user application-password create "$WP_ADMIN_USER" "Push MD E2E" --porcelain)
          PASSWORD=${PASSWORD// /}
          echo "::add-mask::$PASSWORD"
          echo "password=$PASSWORD" >> "$GITHUB_OUTPUT"

      - name: Start PHP built-in server
        run: |
          cd "$WP_DIR"
          nohup php -S 127.0.0.1:8080 -t . "$GITHUB_WORKSPACE/plugins/push-md/Tests/php-server-router.php" > /tmp/php-server.log 2>&1 &
          echo $! > /tmp/server.pid
          for _ in $(seq 1 30); do
            if curl -fsS "$WP_URL/wp-json/" > /dev/null 2>&1; then exit 0; fi
            sleep 1
          done
          echo "Built-in PHP server never became ready." >&2
          cat /tmp/php-server.log
          exit 1

      - name: Run E2E tests
        env:
          PUSH_MD_E2E_BASE_URL: ${{ env.WP_URL }}
          PUSH_MD_E2E_USERNAME: ${{ env.WP_ADMIN_USER }}
          PUSH_MD_E2E_PASSWORD: ${{ steps.app_password.outputs.password }}
        run: vendor/bin/phpunit --testsuite "Push MD E2E"

      - name: Print PHP server log on failure
        if: failure()
        run: |
          echo "----- /tmp/php-server.log -----"
          cat /tmp/php-server.log || true

      - name: Stop PHP built-in server
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill "$(cat /tmp/server.pid)" 2>/dev/null || true
          fi
